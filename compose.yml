name: mereoel-local

services:
  web:
    build:
      context: .
    image: mereoel-lager:local
    expose:
      - "8080"
    networks:
      app:
        aliases:
          - mereoel_web
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O /dev/null http://127.0.0.1:8080/healthz || exit 1"]
      interval: 10s
      timeout: 3s
      retries: 6
      start_period: 20s

  proxy:
    image: nginx:1.27-alpine
    depends_on:
      web:
        condition: service_healthy
    ports:
      - "8080:80"
    volumes:
      - ./deploy/nginx-proxy.conf:/etc/nginx/nginx.conf:ro
    networks:
      - app
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O /dev/null http://127.0.0.1/upstream-health || exit 1"]
      interval: 10s
      timeout: 3s
      retries: 6
      start_period: 30s

networks:
  app:
